<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPER CAP 2026 - ANH HAI SM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050f12; color: #00f2ff; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .radar-container { 
            width: 250px; height: 250px; border: 2px solid #004d55; border-radius: 50%; 
            margin: 20px auto; position: relative; background: radial-gradient(circle, #002d32 0%, #050f12 80%);
        }
        .scan-line { 
            width: 50%; height: 2px; background: linear-gradient(to right, rgba(0,255,255,0), #00f2ff); 
            position: absolute; top: 50%; left: 50%; transform-origin: left center; animation: scan 2s linear infinite; 
        }
        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .status-box { background: #101d23; padding: 15px; border-radius: 15px; border: 1px solid #004d55; margin-top: 10px; }
        .customer-item { 
            background: #002d32; padding: 12px; margin: 10px 0; border-radius: 8px; 
            border-left: 5px solid #ffeb3b; text-align: left;
        }
    </style>
</head>
<body>
    <h2 style="text-shadow: 0 0 10px #00f2ff;">📡 SUPER CAP 2026</h2>
    <div class="radar-container"><div class="scan-line"></div></div>
    <div class="status-box">
        <p>Trạng thái: <span id="status-text" style="color: #4caf50;">ĐANG QUÉT...</span></p>
        <h3 style="margin: 5px 0;">🎯 KHÁCH ĐANG CHỜ</h3>
        <div id="customer-list">Đang tìm cuốc quanh đây...</div>
    </div>

    <script>
        const FB_URL = "https://super-cap-anh-hai-default-rtdb.asia-southeast1.firebasedatabase.app/customers.json";
        async function fetchCustomers() {
            try {
                const res = await fetch(FB_URL);
                const data = await res.json();
                const list = document.getElementById('customer-list');
                if (data) {
                    list.innerHTML = "";
                    Object.keys(data).reverse().forEach(k => {
                        const item = document.createElement('div');
                        item.className = 'customer-item';
                        item.innerHTML = `<strong>🚕 KHÁCH:</strong> ${data[k].info || 'Cuốc mới'}`;
                        list.appendChild(item);
                    });
                } else { list.innerHTML = "Chưa có cuốc mới..."; }
            } catch (e) { document.getElementById('status-text').innerText = "LỖI KẾT NỐI"; }
        }
        setInterval(fetchCustomers, 3000);
        fetchCustomers();
    </script>
</body>
</html>
