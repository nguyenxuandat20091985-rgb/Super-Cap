<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPER CAP - HỆ THỐNG SĂN KHÁCH ANH HAI SM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-color: #00f2ff; --bg-dark: #0a0a0a; --card-bg: #161616; }
        body { background: var(--bg-dark); color: white; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        #lock-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .payment-card { background: var(--card-bg); border: 2px solid #ff4444; padding: 20px; border-radius: 20px; max-width: 350px; }
        .header { background: linear-gradient(180deg, #003336 0%, transparent 100%); padding: 20px; text-align: center; border-bottom: 1px solid var(--main-color); }
        .radar-container { position: relative; height: 300px; background: radial-gradient(circle, #003336 0%, #0a0a0a 100%); overflow: hidden; }
        .radar-sweep { position: absolute; inset: 0; background: conic-gradient(from 0deg, transparent, var(--main-color)); opacity: 0.1; animation: sweep 4s linear infinite; }
        @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .map-overlay { position: absolute; inset: 0; padding: 10px; }
        .customer-point { position: absolute; width: 15px; height: 15px; background: #ffea00; border-radius: 50%; box-shadow: 0 0 20px #ffea00; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
        .info-panel { padding: 15px; }
        .btn-action { background: var(--main-color); color: black; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="payment-card">
            <h2 style="color:#ff4444">HẾT HẠN SỬ DỤNG</h2>
            <p>Vui lòng chuyển khoản để kích hoạt Radar</p>
            <img src="https://img.vietqr.io/image/bidv-4430269669-compact2.jpg?amount=99000&addInfo=KichHoatSuperCap" style="width:200px; border-radius:10px;">
            <p><b>NGUYEN XUAN DAT</b><br>4430269669 (BIDV)</p>
            <button class="btn-action" onclick="window.open('https://zalo.me/s/xxxxxxxx')">XÁC NHẬN ĐÃ CHUYỂN</button>
        </div>
    </div>

    <div class="header">
        <h1 style="margin:0; color:var(--main-color);">SUPER CAP 2026</h1>
        <p>HỆ THỐNG SĂN KHÁCH ANH HAI SM</p>
    </div>

    <div class="radar-container">
        <div class="radar-sweep"></div>
        <div id="map" class="map-overlay"></div>
    </div>

    <div class="info-panel">
        <div style="background: #222; padding: 15px; border-radius: 10px; margin-bottom: 15px;">
            <p id="user-status"><i class="fas fa-wifi"></i> Đang kết nối Radar...</p>
        </div>
        <h3><i class="fas fa-crosshairs"></i> KHÁCH ĐANG CHỜ (THỰC TẾ)</h3>
        <div id="customer-list"></div>
    </div>

    <script>
        const FB_URL = "https://super-cap-anh-hai-default-rtdb.asia-southeast1.firebasedatabase.app/customers.json";

            fetch(FB_URL)
            .then(res => res.json())
            .then(data => {
                const map = document.getElementById('map');
                const list = document.getElementById('customer-list');
                map.innerHTML = '';
                list.innerHTML = '';

                if (!data) {
                    list.innerHTML = '<p style="opacity:0.5">Đang quét tìm khách quanh đây...</p>';
                    return;
                }

                Object.values(data).forEach(c => {
                    // Hiện chấm vàng trên Radar
                    const dot = document.createElement('div');
                    dot.className = 'customer-point';
                    dot.style.top = Math.floor(Math.random() * 80 + 10) + "%";
                    dot.style.left = Math.floor(Math.random() * 80 + 10) + "%";
                    map.appendChild(dot);

                    // Hiện danh sách cuốc
                    const item = document.createElement('div');
                    item.style.padding = "10px";
                    item.style.borderBottom = "1px solid #333";
                    item.innerHTML = `<i class="fas fa-map-marker-alt" style="color:#ffea00"></i> ${c.info || 'Khách vãng lai'}`;
                    list.appendChild(item);
                });
                document.getElementById('user-status').innerHTML = `<i class="fas fa-check-circle" style="color:#00ff00"></i> RADAR ĐANG HOẠT ĐỘNG`;
            })
            .catch(err => console.log("Chưa có dữ liệu khách"));
        }

        // Cứ 3 giây quét khách mới 1 lần
        setInterval(updateRadar, 3000);
        updateRadar();
    </script>
</body>
</html>
