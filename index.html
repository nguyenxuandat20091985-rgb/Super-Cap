<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPER CAP 2026</title>
    <style>
        body { background-color: #0a191e; color: #80deea; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #4dd0e1; margin-bottom: 5px; }
        .radar-container { width: 300px; height: 300px; border: 2px solid #006064; border-radius: 50%; margin: 20px auto; position: relative; background: radial-gradient(circle, #002d32 0%, #0a191e 70%); overflow: hidden; }
        .scan-line { width: 50%; height: 2px; background: linear-gradient(to right, rgba(0,255,255,0), #00bcd4); position: absolute; top: 50%; left: 50%; transform-origin: left center; animation: scan 3s linear infinite; }
        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .status-box { background: #1a2a30; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid #004d40; }
        .customer-item { background: #002d32; padding: 10px; margin: 10px 0; border-radius: 5px; border-left: 4px solid #ffeb3b; text-align: left; animation: flash 1s infinite alternate; }
        @keyframes flash { from { opacity: 1; } to { opacity: 0.7; } }
        #status-text { color: #4caf50; font-weight: bold; }
    </style>
</head>
<body>
    <h1>SUPER CAP 2026</h1>
    <p>HỆ THỐNG SĂN KHÁCH ANH HAI SM</p>
    
    <div class="radar-container">
        <div class="scan-line"></div>
        <div id="radar-dots"></div>
    </div>

    <div class="status-box">
        <p>📡 Trạng thái: <span id="status-text">ĐANG KẾT NỐI...</span></p>
        <h3>🎯 KHÁCH ĐANG CHỜ (THỰC TẾ)</h3>
        <div id="customer-list">Đang quét tìm khách quanh đây...</div>
    </div>

    <script>
        // LINK FIREBASE CHUẨN CỦA ANH ĐẠT
        const FB_URL = "https://super-cap-anh-hai-default-rtdb.asia-southeast1.firebasedatabase.app/customers.json";

        async function fetchCustomers() {
            try {
                const response = await fetch(FB_URL);
                const data = await response.json();
                const list = document.getElementById('customer-list');
                const status = document.getElementById('status-text');
                
                if (data) {
                    status.innerText = "RADAR ĐANG HOẠT ĐỘNG";
                    status.style.color = "#4caf50";
                    list.innerHTML = "";
                    Object.keys(data).forEach(key => {
                        const item = document.createElement('div');
                        item.className = 'customer-item';
                        item.innerHTML = `<strong>🚕 MỚI:</strong> ${data[key].info}`;
                        list.appendChild(item);
                    });
                } else {
                    status.innerText = "RADAR TRỐNG";
                    list.innerHTML = "Chưa có cuốc mới, đang chờ nổ...";
                }
            } catch (error) {
                console.error("Lỗi kết nối:", error);
            }
        }

        // Cập nhật dữ liệu mỗi 3 giây
        setInterval(fetchCustomers, 3000);
        fetchCustomers();
    </script>
</body>
</html>
