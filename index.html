<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SUPER-CAP V2.2 - ANHHAIC2</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #00bfa5; --dark: #002d26; --gold: #ffc107; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }

        /* HIỆU ỨNG CHẤM XANH HOẠT ĐỘNG */
        .pulse-marker {
            width: 20px; height: 20px; background: var(--primary);
            border: 3px solid white; border-radius: 50%;
            position: relative; box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }
        .pulse-marker::after {
            content: ""; position: absolute; inset: -10px;
            border: 3px solid var(--primary); border-radius: 50%;
            animation: pulse-ring 1.5s infinite;
        }
        @keyframes pulse-ring { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }

        /* AUTH & UI */
        .auth-screen { position: fixed; inset: 0; background: var(--primary); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 30px; border-radius: 30px; width: 80%; text-align: center; }
        .auth-card input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; outline: none; }
        
        .header { position: fixed; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; z-index: 1000; }
        .badge { background: white; padding: 10px 15px; border-radius: 20px; font-weight: bold; font-size: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .footer { position: fixed; bottom: 0; inset-x: 0; background: white; z-index: 2000; padding: 15px; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); }
        .nav { display: flex; justify-content: space-around; text-align: center; }
        .nav-item { border: none; background: none; flex: 1; font-size: 11px; font-weight: bold; color: #999; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 5px; font-style: normal; }

        /* BÁO KHÁCH POPUP */
        .customer-alert {
            position: fixed; top: 100px; left: 20px; right: 20px;
            background: var(--dark); color: white; padding: 20px;
            border-radius: 20px; z-index: 3000; display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* MENU VIP */
        .vip-menu { position: fixed; inset: 0; background: white; z-index: 4000; display: none; flex-direction: column; }
        .vip-card { border: 2px solid #f0f0f0; margin: 10px 20px; padding: 20px; border-radius: 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <h2 style="color:var(--primary)">XANH SM PREMIUM</h2>
            <input type="number" id="scPhone" placeholder="Số điện thoại">
            <input type="text" id="scPlate" placeholder="Biển số xe">
            <button onclick="login()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:15px; font-weight:bold;">ĐĂNG KÝ NGAY</button>
        </div>
    </div>

    <div class="customer-alert" id="custAlert">
        <div id="custInfo"></div>
        <button onclick="this.parentElement.style.display='none'" style="background:none; border:none; color:#aaa; width:100%; margin-top:15px; font-size: 13px;">Bỏ qua cuốc này</button>
    </div>

    <div class="header">
        <div class="badge" id="plateDisp">🆔 SC-GUEST</div>
        <div class="badge" style="color:var(--gold)">🏆 VIP PRO</div>
    </div>

    <div id="map"></div>

    <div class="footer">
        <div style="text-align:center; font-size:12px; font-weight:bold; color:var(--primary); margin-bottom:10px;">
            📡 TRẠNG THÁI: ĐANG QUÉT KHÁCH...
        </div>
        <div class="nav">
            <button class="nav-item active"><i>🏠</i>Trang chủ</button>
            <button class="nav-item" onclick="openVip()"><i>💳</i>Nạp VIP</button>
            <button class="nav-item" onclick="location.reload()"><i>🔄</i>Cập nhật</button>
        </div>
    </div>

    <div id="vipMenu" class="vip-menu">
        <div style="padding:40px 20px; background:var(--primary); color:white; text-align:center; border-radius:0 0 30px 30px;">
            <h2 style="margin:0">NÂNG CẤP VIP</h2>
            <button onclick="closeVip()" style="position:absolute; top:20px; left:20px; background:none; border:none; color:white; font-size:24px;">✕</button>
        </div>
        <div style="margin-top:20px">
            <div class="vip-card" style="border-color:var(--primary)">
                <b>GÓI PRO</b><br><span style="font-size:24px; color:var(--primary); font-weight:900;">49.000đ</span>
                <button onclick="pay(49000,'PRO')" style="width:100%; padding:10px; background:var(--primary); color:white; border:none; border-radius:10px; margin-top:10px;">NẠP NGAY</button>
            </div>
            <div class="vip-card">
                <b>PRO MAX</b><br><span style="font-size:24px; color:var(--primary); font-weight:900;">129.000đ</span>
                <button onclick="pay(129000,'PROMAX')" style="width:100%; padding:10px; background:var(--primary); color:white; border:none; border-radius:10px; margin-top:10px;">NẠP NGAY</button>
            </div>
            <div class="vip-card">
                <b>DÙNG THỬ</b><br><span style="color:#999">Miễn phí 7 ngày</span>
                <button disabled style="width:100%; padding:10px; background:#eee; border:none; border-radius:10px; margin-top:10px;">ĐÃ SỬ DỤNG</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map, driverMarker;
        var userLoc = [20.95, 107.07]; // Mặc định Hạ Long
        const FIREBASE_URL = "https://super-cap-anh-hai-default-rtdb.asia-southeast1.firebasedatabase.app/drivers.json";

        function initMap() {
            if (!map) {
                map = L.map('map', { zoomControl: false }).setView(userLoc, 16);
                L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                    maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
                }).addTo(map);
            }

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(function(position) {
                    userLoc = [position.coords.latitude, position.coords.longitude];
                    map.setView(userLoc, 16);
                    
                    if (!driverMarker) {
                        const pulseIcon = L.divIcon({ className: '', html: '<div class="pulse-marker"></div>', iconSize: [20, 20] });
                        driverMarker = L.marker(userLoc, { icon: pulseIcon }).addTo(map);
                    } else {
                        driverMarker.setLatLng(userLoc);
                    }
                }, null, { enableHighAccuracy: true });
            }
        }

        function login() {
            const p = document.getElementById('scPhone').value;
            const b = document.getElementById('scPlate').value;
            if(!p || !b) return alert("Nhập đủ thông tin anh ơi!");
            
            const userData = { phone: p, plate: b, time: new Date().toLocaleString() };
            fetch(FIREBASE_URL, { method: 'POST', body: JSON.stringify(userData) })
            .then(() => {
                localStorage.setItem('sc_user', JSON.stringify(userData));
                location.reload();
            });
        }

        let saved = localStorage.getItem('sc_user');
        if(saved) {
            document.getElementById('authScreen').style.display = 'none';
            const data = JSON.parse(saved);
            document.getElementById('plateDisp').innerText = data.plate;
            initMap();
        }

        function openVip() { document.getElementById('vipMenu').style.display = 'flex'; }
        function closeVip() { document.getElementById('vipMenu').style.display = 'none'; }
        function pay(a, p) { 
            const user = JSON.parse(localStorage.getItem('sc_user'));
            const code = `NAP VIP ${p} ${user ? user.phone : ''}`;
            window.open(`https://img.vietqr.io/image/BIDV-4430269669-compact2.png?amount=${a}&addInfo=${code}`, '_blank'); 
        }
    </script>
    <script src="ai_hunter.js"></script>
</body>
</html>
