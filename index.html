<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SUPER-CAP V2.1 - ANHHAIC2</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #00bfa5; --dark: #002d26; --gold: #ffc107; --bg: #f8faf9; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--bg); overflow: hidden; }
        
        /* Bản đồ */
        #map { height: 100vh; width: 100vw; z-index: 1; }

        /* MÀN HÌNH ĐĂNG NHẬP */
        .auth-screen { position: fixed; inset: 0; background: var(--primary); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 35px 25px; border-radius: 35px; width: 85%; max-width: 380px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); text-align: center; }
        .auth-card h2 { color: var(--primary); font-size: 22px; margin-bottom: 5px; font-weight: 900; }
        .auth-card input { width: 100%; padding: 16px; margin: 10px 0; border-radius: 15px; border: 1.5px solid #eee; font-size: 16px; box-sizing: border-box; outline: none; }
        .btn-login { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 18px; font-weight: 800; font-size: 16px; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,191,165,0.3); }

        /* HEADER */
        .header { position: fixed; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; z-index: 1000; pointer-events: none; }
        .badge { background: rgba(255,255,255,0.95); padding: 12px 18px; border-radius: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); font-size: 12px; font-weight: 800; pointer-events: auto; }
        
        /* FOOTER XANH SM */
        .footer-panel { position: fixed; bottom: 0; left: 0; right: 0; background: white; z-index: 2000; border-radius: 30px 30px 0 0; padding: 15px 15px 25px 15px; box-shadow: 0 -5px 25px rgba(0,0,0,0.1); }
        .nav-grid { display: flex; justify-content: space-around; }
        .nav-item { border: none; background: none; color: #bdc3c7; font-size: 11px; font-weight: 700; flex: 1; text-align: center; }
        .nav-item.active { color: var(--primary); }
        .nav-item img { width: 28px; height: 28px; display: block; margin: 0 auto 5px; }

        /* MENU VIP MỚI */
        .vip-menu { position: fixed; inset: 0; background: #fff; z-index: 4000; display: none; flex-direction: column; }
        .vip-header { background: var(--primary); color: white; padding: 40px 20px 30px; text-align: center; border-radius: 0 0 35px 35px; position: relative; }
        .vip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; overflow-y: auto; }
        .vip-card { background: #fdfdfd; border: 2px solid #f0f0f0; border-radius: 20px; padding: 18px 12px; text-align: center; }
        .vip-card b { font-size: 15px; color: var(--dark); display: block; margin-bottom: 5px; }
        .vip-card span { color: var(--primary); font-weight: 900; font-size: 18px; }
        .btn-buy { width: 100%; padding: 10px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 13px; margin-top: 10px; }

        /* MARKER XE CHUẨN */
        .driver-marker { width: 25px; height: 25px; background: var(--primary); border: 3px solid white; border-radius: 50%; box-shadow: 0 0 15px var(--primary); }
    </style>
</head>
<body>

    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <h2>XANH SM PREMIUM</h2>
            <p style="color: #666; font-size: 13px; margin-bottom: 20px;">Hệ thống radar quét khách AI</p>
            <input type="number" id="scPhone" placeholder="Số điện thoại">
            <input type="text" id="scPlate" placeholder="Biển số xe (VD: 14H-063.21)">
            <button class="btn-login" onclick="login()">BẮT ĐẦU TRỰC TUYẾN</button>
        </div>
    </div>

    <div class="header">
        <div class="badge" id="plateDisp">🆔 SC-GUEST</div>
        <div class="badge" style="color:var(--gold)">🏆 VIP PRO</div>
    </div>

    <div id="map"></div>

    <div class="footer-panel">
        <div style="text-align:center; font-size:13px; font-weight:800; color:var(--primary); margin-bottom:12px;">
            📡 TRẠNG THÁI: <span id="statusText">ĐANG DÒ KHÁCH...</span>
        </div>
        <div class="nav-grid">
            <button class="nav-item active" onclick="closeVip()">
                <img src="https://cdn-icons-png.flaticon.com/512/1946/1946436.png">Trang chủ
            </button>
            <button class="nav-item" onclick="openVip()">
                <img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">Nạp VIP
            </button>
            <button class="nav-item" onclick="location.reload()">
                <img src="https://cdn-icons-png.flaticon.com/512/2805/2805355.png">Cập nhật
            </button>
        </div>
    </div>

    <div id="vipMenu" class="vip-menu">
        <div class="vip-header">
            <h2 style="margin:0">NÂNG CẤP VIP</h2>
            <p style="font-size: 13px; opacity: 0.9;">Ưu tiên nổ cuốc đi tỉnh, sân bay</p>
            <button onclick="closeVip()" style="position:absolute; top:20px; left:20px; background:none; border:none; color:white; font-size:24px;">✕</button>
        </div>
        <div class="vip-grid">
            <div class="vip-card"><b>CHUYẾN LẺ</b><span>5.000đ</span><button class="btn-buy" onclick="pay(5000,'CHUYEN LE')">NẠP NGAY</button></div>
            <div class="vip-card" style="border-color:var(--primary)"><b>GÓI PRO</b><span>49.000đ</span><button class="btn-buy" onclick="pay(49000,'GOI PRO')">NẠP NGAY</button></div>
            <div class="vip-card"><b>PRO MAX</b><span>129.000đ</span><button class="btn-buy" onclick="pay(129000,'PRO MAX')">NẠP NGAY</button></div>
            <div class="vip-card"><b>DÙNG THỬ</b><span>Miễn phí</span><button class="btn-buy" style="background:#ccc;">ĐÃ DÙNG</button></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const MY_STK = "4430269669";
        const MY_NAME = "NGUYEN XUAN DAT";
        var map, driverMarker;

        // KIỂM TRA ĐĂNG NHẬP
        let user = JSON.parse(localStorage.getItem('sc_data'));
        if(user) {
            document.getElementById('authScreen').style.display = 'none';
            startApp();
        }

        function login() {
            const phone = document.getElementById('scPhone').value;
            const plate = document.getElementById('scPlate').value;
            if(!phone || !plate) return alert("Anh nhập thiếu thông tin rồi!");
            
            user = { id: 'SC'+phone.slice(-4), plate: plate };
            localStorage.setItem('sc_data', JSON.stringify(user));
            document.getElementById('authScreen').style.display = 'none';
            startApp();
        }

        function startApp() {
            document.getElementById('plateDisp').innerText = user.plate;
            
            // DÙNG LAYER GOOGLE MAPS CHO NÉT
            map = L.map('map', { zoomControl: false }).setView([20.95, 107.07], 15);
            L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
            }).addTo(map);

            // ĐỊNH VỊ
            if(navigator.geolocation) {
                navigator.geolocation.watchPosition(p => {
                    const pos = [p.coords.latitude, p.coords.longitude];
                    if(!driverMarker) {
                        driverMarker = L.circleMarker(pos, { radius: 10, color: '#fff', weight: 3, fillColor: '#00bfa5', fillOpacity: 1 }).addTo(map);
                    } else { driverMarker.setLatLng(pos); }
                    map.panTo(pos);
                }, null, { enableHighAccuracy: true });
            }
        }

        function openVip() { document.getElementById('vipMenu').style.display = 'flex'; }
        function closeVip() { document.getElementById('vipMenu').style.display = 'none'; }

        function pay(amt, plan) {
            const code = `NAP ${plan.replace(' ','')} ${user.id}`;
            const qr = `https://img.vietqr.io/image/BIDV-${MY_STK}-compact2.png?amount=${amt}&addInfo=${code}&accountName=${MY_NAME}`;
            window.open(qr, '_blank');
        }
    </script>
</body>
</html>
