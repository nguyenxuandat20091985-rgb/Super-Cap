<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SUPER-CAP V2 - ANHHAIC2</title>
    
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    
    <style>
        :root { --primary: #00bfa5; --dark: #013a33; --gold: #ffc107; --bg: #f4f7f6; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Lexend', sans-serif; background: var(--bg); overflow: hidden; }
        
        #map { height: 100vh; width: 100vw; z-index: 1; }

        /* MÀN HÌNH ĐĂNG NHẬP XANH SM STYLE */
        .auth-screen { position: fixed; inset: 0; background: var(--primary); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 40px 30px; border-radius: 40px; width: 88%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-align: center; }
        .auth-card h1 { color: var(--primary); font-size: 24px; margin-bottom: 10px; font-weight: 900; }
        .auth-card input { width: 100%; padding: 18px; margin: 12px 0; border-radius: 15px; border: 2px solid #f0f0f0; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.3s; }
        .auth-card input:focus { border-color: var(--primary); background: #f0fffb; }
        .btn-main { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 20px; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 8px 20px rgba(0,191,165,0.3); }

        /* HEADER UI */
        .header { position: fixed; top: env(safe-area-inset-top, 20px); left: 15px; right: 15px; display: flex; justify-content: space-between; z-index: 1000; }
        .status-badge { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding: 12px 20px; border-radius: 30px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; border: 1px solid rgba(0,191,165,0.2); }
        .dot { height: 10px; width: 10px; background: #00e676; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }

        /* FOOTER UI */
        .footer-panel { position: fixed; bottom: 0; left: 0; right: 0; background: white; z-index: 2000; border-radius: 35px 35px 0 0; padding: 20px 20px 40px 20px; box-shadow: 0 -10px 40px rgba(0,0,0,0.12); }
        .nav-grid { display: flex; justify-content: space-around; align-items: center; }
        .nav-item { border: none; background: none; color: #a0aec0; font-size: 12px; font-weight: 700; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 26px; display: block; margin-bottom: 5px; font-style: normal; }

        /* MARKER XE 3D */
        .driver-indicator { width: 40px; height: 40px; background: rgba(0,191,165,0.2); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .driver-core { width: 18px; height: 18px; background: var(--primary); border-radius: 50%; border: 3px solid white; box-shadow: 0 0 15px var(--primary); }

        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 230, 118, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 230, 118, 0); } }
    </style>
</head>
<body>

    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <h1>XANH SM PREMIUM</h1>
            <p style="color: #718096; margin-bottom: 20px;">Hệ thống Super-Cap AI 2026</p>
            <input type="number" id="scPhone" placeholder="Số điện thoại tài xế">
            <input type="text" id="scPlate" placeholder="Biển số xe (VD: 30K-12345)">
            <button class="btn-main" onclick="handleAuth()">ĐĂNG NHẬP NGAY</button>
            <p style="font-size: 12px; color: #a0aec0; margin-top: 20px;">Phiên bản Pro Max - Anhhaic2</p>
        </div>
    </div>

    <div class="header">
        <div class="status-badge"><span class="dot"></span> <span id="userPlate">ĐANG TẢI...</span></div>
        <div class="status-badge" style="color: var(--gold)">🏆 VIP PRO</div>
    </div>

    <div id="map"></div>

    <div class="footer-panel">
        <div style="text-align:center; font-size:14px; font-weight:800; color:var(--primary); margin-bottom:15px; letter-spacing: 1px;">
            📡 TRẠNG THÁI: <span id="radarStatus" style="color: var(--dark)">ĐANG DÒ KHÁCH...</span>
        </div>
        <div class="nav-grid">
            <button class="nav-item active"><i>🏠</i>Trang chủ</button>
            <button class="nav-item" onclick="alert('Mở Menu Nạp VIP BIDV')"><i>💰</i>Nạp VIP</button>
            <button class="nav-item" onclick="location.reload()"><i>🔄</i>Cập nhật</button>
        </div>
    </div>

    <script>
        let map, driverMarker;
        const MY_STK = "4430269669"; //

        // 1. KIỂM TRA ĐĂNG NHẬP
        let userData = JSON.parse(localStorage.getItem('sc_session'));
        if(userData) {
            document.getElementById('authScreen').style.display = 'none';
            initApp();
        }

        function handleAuth() {
            const phone = document.getElementById('scPhone').value;
            const plate = document.getElementById('scPlate').value;
            if(phone.length < 10 || !plate) return alert("Vui lòng điền đủ thông tin!");
            
            userData = { id: 'SC'+phone.slice(-4), phone: phone, plate: plate };
            localStorage.setItem('sc_session', JSON.stringify(userData));
            document.getElementById('authScreen').style.display = 'none';
            initApp();
        }

        function initApp() {
            document.getElementById('userPlate').innerText = userData.plate;
            
            // 2. KHỞI TẠO BẢN ĐỒ 3D (Dùng Style sáng mượt như Xanh SM)
            map = new maplibregl.Map({
                container: 'map',
                style: 'https://demotiles.maplibre.org/style.json', // Có thể thay bằng Mapbox/Maptiler để nét hơn nữa
                center: [107.07, 20.95], 
                zoom: 15,
                pitch: 45, // Độ nghiêng 3D
                bearing: 0
            });

            startTracking();
        }

        // 3. ĐỊNH VỊ CHUYÊN NGHIỆP
        function startTracking() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    const coords = [pos.coords.longitude, pos.coords.latitude];
                    
                    if (!driverMarker) {
                        const el = document.createElement('div');
                        el.className = 'driver-indicator';
                        el.innerHTML = '<div class="driver-core"></div>';
                        
                        driverMarker = new maplibregl.Marker(el)
                            .setLngLat(coords)
                            .addTo(map);
                    } else {
                        driverMarker.setLngLat(coords);
                    }
                    map.flyTo({ center: coords, speed: 0.8 });
                }, null, { enableHighAccuracy: true });
            }
        }
    </script>
</body>
</html>
